MOD_BSR_FORM="BSR Form"
MOD_BSR_FORM_XML_DESCRIPTION="<div style='background: #f4f7f9; padding: 20px; border-left: 5px solid #004E82; border-radius: 4px; font-family: sans-serif;'><h2 style='margin-top: 0; color: #004E82;'>BSR Form — Instructions</h2><p>Universal modal form module with analytics and redirect support.</p><h3 style='color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px;'>1. How to open the form</h3><p>Add a special CSS class to any button or link on the site:</p><ul><li><b>General call:</b> class <code>bsr-open-modal</code> (opens the first BSR form on the page).</li><li><b>Specific call:</b> set 'Form ID' in settings (e.g. <code>order</code>) and use class <code>bsr-open-order</code>.</li></ul><p><i>Example:</i> <code>&lt;button class='bsr-open-order'&gt;Order&lt;/button&gt;</code></p><h3 style='color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px;'>2. Redirect after submission</h3><p>If the <b>'Redirect URL'</b> field is filled (e.g. <code>/thanks</code>), the user will be redirected to this page immediately after success. If empty, the standard message will be shown.</p><h3 style='color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px;'>3. Yandex.Metrica</h3><p>In the <b>'Goal ID'</b> field, enter the identifier from the Metrica settings (type: JavaScript event). The module will automatically find the counter on the page and send the data.</p><p style='background: #fff; padding: 10px; border: 1px dashed #999; margin-top: 15px;'><b>Note:</b> The module only works with the <a href='https://radicalmart.ru/all/radicalform' target='_blank'>RadicalForm</a> plugin installed.</p></div>"