MOD_BSR_FORM_XML_DESCRIPTION="<div style='background: #f4f7f9; padding: 20px; border-left: 5px solid #004E82; border-radius: 4px; font-family: sans-serif;'><h2 style='margin-top: 0; color: #004E82;'>BSR Form — Инструкция</h2><p>Универсальный модуль всплывающей формы с поддержкой аналитики и редиректов.</p><h3 style='color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px;'>1. Как открыть форму</h3><p>Добавьте любой кнопке или ссылке на сайте специальный CSS-класс:</p><ul><li><b>Общий вызов:</b> класс <code>bsr-open-modal</code> (открывает первую форму BSR на странице).</li><li><b>Точечный вызов:</b> задайте 'ID формы' в настройках (например, <code>order</code>) и используйте класс <code>bsr-open-order</code>.</li></ul><p><i>Пример:</i> <code>&lt;button class='bsr-open-order'&gt;Заказать&lt;/button&gt;</code></p><h3 style='color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px;'>2. Редирект после отправки</h3><p>Если поле <b>'URL для редиректа'</b> заполнено (например: <code>/thanks</code>), пользователь будет перенаправлен на эту страницу сразу после успеха. Если пусто — покажется стандартное сообщение.</p><h3 style='color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px;'>3. Яндекс.Метрика</h3><p>В поле <b>'ID цели'</b> впишите идентификатор из настроек Метрики (тип: JavaScript-событие). Модуль автоматически найдет счетчик на странице и отправит данные.</p><p style='background: #fff; padding: 10px; border: 1px dashed #999; margin-top: 15px;'><b>Внимание:</b> Модуль работает только при установленном плагине <a href='https://radicalmart.ru/all/radicalform' target='_blank'>RadicalForm</a>.</p></div>"ы